    <rect x="0" y="20" width="80" height="50" rx="8" fill="#ffffff"/>
    <rect x="60" y="0" width="40" height="40" rx="4" fill="#ffffff"/>
    <circle cx="25" cy="75" r="15" fill="#0D47A1"/>
    <circle cx="85" cy="75" r="15" fill="#0D47A1"/>
  </g>
  <!-- Car icon -->
  <g transform="translate(80, 300)">
    <rect x="10" y="20" width="70" height="35" rx="10" fill="#ffffff"/>
    <rect x="20" y="5" width="50" height="25" rx="8" fill="#ffffff"/>
    <circle cx="30" cy="60" r="12" fill="#0D47A1"/>
    <circle cx="60" cy="60" r="12" fill="#0D47A1"/>
